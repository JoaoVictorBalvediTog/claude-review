name: Claude PR Reviewer
description: Run Claude-based pull request review and comment results on GitHub.

inputs:
  repository:
    description: GitHub repository slug, for example owner/repo.
    required: true

  pull_request_number:
    description: Pull request number.
    required: true

  run_mode:
    description: Reviewer execution mode.
    required: false
    default: comment_review

runs:
  using: composite
  steps:
    - name: Checkout target repository
      if: inputs.run_mode != 'reply_review'
      uses: actions/checkout@v4

    - name: Validate environment
      shell: bash
      run: |
        if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
          echo "ANTHROPIC_API_KEY is missing."
          exit 1
        fi

        if [ -z "${GITHUB_TOKEN:-}" ]; then
          echo "GITHUB_TOKEN is missing."
          exit 1
        fi

    - name: Run Claude PR Reviewer
      shell: bash
      env:
        # When running inside GitHub Actions, reviews are posted by github-actions[bot].
        # reply_review.py uses this to find threads started by the bot.
        REVIEWER_LOGIN: github-actions[bot]
      run: |
        chmod +x "${{ github.action_path }}/review-pr.sh"
        case "${{ inputs.run_mode }}" in
          reply_review)
            "${{ github.action_path }}/review-pr.sh" reply review "${{ inputs.repository }}" "${{ inputs.pull_request_number }}"
            ;;
          *)
            "${{ github.action_path }}/review-pr.sh" comment review "${{ inputs.repository }}" "${{ inputs.pull_request_number }}"
            ;;
        esac