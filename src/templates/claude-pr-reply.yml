name: Claude PR Review - Reply

on:
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-reply:
    # Don't reply to our own comments — prevents infinite reply loops.
    if: github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Reply to PR comment
        uses: toglab/claude-review-action@main
        with:
          repository: ${{ github.repository }}
          pull_request_number: ${{ github.event.pull_request.number }}
          run_mode: reply_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
